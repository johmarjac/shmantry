name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor WASM
        run: |
          dotnet publish shmantry.Web/shmantry.Web.csproj \
            -c Release \
            -o publish \
            /p:BlazorEnableCompression=false

      - name: Fix base href for GitHub Pages
        # GitHub Pages serves the app at /shmantry/, so base href must match
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|g" \
            publish/wwwroot/index.html

      - name: Add 404.html for client-side routing
        # GitHub Pages serves 404.html for unknown paths → Blazor handles routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Disable Jekyll processing
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
