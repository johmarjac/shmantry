<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFAB5E"/>
      <stop offset="100%" stop-color="#C75200"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="500" height="500" rx="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="108" fill="url(#bg)"/>
  <rect width="500" height="500" rx="108" fill="url(#shine)"/>

  <!-- ── Cabinet outer frame ── -->
  <rect x="60" y="70" width="380" height="390" rx="18"
        fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="20" stroke-linejoin="round"/>

  <!-- Cabinet header band -->
  <rect x="60" y="70" width="380" height="52" rx="18" fill="rgba(255,255,255,0.15)"/>

  <!-- Horizontal shelf (middle) -->
  <rect x="60" y="295" width="380" height="16" rx="5" fill="rgba(255,255,255,0.95)"/>

  <!-- Vertical center divider -->
  <rect x="242" y="122" width="16" height="338" rx="5" fill="rgba(255,255,255,0.95)"/>

  <!-- ── Top-left: tall jar ── -->
  <!-- lid -->
  <rect x="102" y="142" width="48" height="14" rx="5" fill="rgba(255,255,255,0.85)"/>
  <!-- body -->
  <rect x="96"  y="154" width="60" height="110" rx="14" fill="rgba(255,255,255,0.92)"/>
  <!-- highlight -->
  <rect x="113" y="164" width="10" height="78"  rx="4"  fill="rgba(255,255,255,0.30)"/>

  <!-- ── Top-right: two cans ── -->
  <rect x="272" y="152" width="62" height="90" rx="14" fill="rgba(255,255,255,0.92)"/>
  <rect x="350" y="162" width="48" height="72" rx="12" fill="rgba(255,255,255,0.78)"/>
  <!-- can lid lines -->
  <rect x="272" y="172" width="62" height="6"  rx="2"  fill="rgba(0,0,0,0.08)"/>
  <rect x="350" y="180" width="48" height="5"  rx="2"  fill="rgba(0,0,0,0.06)"/>

  <!-- ── Bottom-left: cereal box ── -->
  <rect x="90"  y="318" width="80" height="118" rx="10" fill="rgba(255,255,255,0.92)"/>
  <!-- box window cutout hint -->
  <rect x="106" y="334" width="46" height="34"  rx="6"  fill="rgba(253,129,34,0.25)"/>

  <!-- ── Bottom-right: bottle + small can ── -->
  <!-- bottle -->
  <rect x="280" y="308" width="42" height="128" rx="14" fill="rgba(255,255,255,0.92)"/>
  <!-- bottle neck -->
  <rect x="293" y="296" width="16" height="16"  rx="5"  fill="rgba(255,255,255,0.85)"/>
  <!-- small can -->
  <rect x="334" y="328" width="56" height="80"  rx="13" fill="rgba(255,255,255,0.78)"/>
  <rect x="334" y="348" width="56" height="6"   rx="2"  fill="rgba(0,0,0,0.06)"/>
</svg>
