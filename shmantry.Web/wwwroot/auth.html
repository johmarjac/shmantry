<!DOCTYPE html>
<html>
<head><title>Shmantry – Auth</title></head>
<body>
<script src="js/msal-browser.min.js"></script>
<script>
(async function () {
    // Minimal MSAL host for popup redirects.
    // This page must NOT load Blazor — Blazor's router strips the hash
    // before MSAL can read the auth code, causing hash_empty_error.
    const redirectUri = location.origin + location.pathname; // this page's URL, no hash/query
    const app = new msal.PublicClientApplication({
        auth: {
            clientId: '2ecd8dad-f10f-4632-b1a1-11923f9dcfc2',
            authority: 'https://login.microsoftonline.com/consumers',
            redirectUri: redirectUri
        }
    });
    await app.initialize();
    await app.handleRedirectPromise();
    // Window will be closed by the opener (MSAL) automatically.
})();
</script>
</body>
</html>
