<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Shmantry</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="preload" id="webassembly" />
    <script type="importmap"></script>
</head>
<body>
    <div id="app">
        <style>
            html, body { margin: 0; background: #121212; height: 100%; }
            .shm-loading {
                display: flex; align-items: center; justify-content: center;
                height: 100vh; flex-direction: column; gap: 16px;
                font-family: Roboto, sans-serif; color: #ffffff99;
            }
            .shm-spinner {
                width: 40px; height: 40px; border-radius: 50%;
                border: 3px solid #ffffff22; border-top-color: #594ae2;
                animation: spin .8s linear infinite;
            }
            @keyframes spin { to { transform: rotate(360deg); } }
        </style>
        <div class="shm-loading">
            <div class="shm-spinner"></div>
            <span>Wird geladen…</span>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none">
        Ein unbehandelter Fehler ist aufgetreten.
        <a href="." class="reload">Neu laden</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_content/Microsoft.Authentication.WebAssembly.Msal/AuthenticationService.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>
</html>
